name: Build

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22', '24']

    steps:
      - uses: starweb-libs/.github/.github/actions/setup@v1.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
